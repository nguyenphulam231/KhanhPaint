<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý đơn hàng</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>
      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Sales & CRM</p>
            <h1>Quản lý đơn hàng</h1>
          </div>
        </div>

        <section class="admin-card">
          <p id="message"></p>
          <p class="status-note">
            Luồng chuẩn: pending → confirmed → mixing → completed. Khi hủy đơn, database trigger tự hoàn kho sơn gốc và tinh màu.
          </p>
          <div id="ordersTable">Đang tải đơn hàng...</div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("orders");
      initAdminShell();

      const message = document.getElementById("message");
      const ordersTable = document.getElementById("ordersTable");
      let employeesCache = [];
      let shiftsCache = [];

      async function loadOrders() {
        const token = getAdminToken();
        if (!token) return;

        const response = await fetch(API_ROUTES.GET_ORDERS, {
          headers: { Authorization: "Bearer " + token },
        });
        const orders = await response.json();
        if (!response.ok) {
          ordersTable.textContent = orders.error || "Không thể tải đơn hàng.";
          return;
        }

        if (orders.length === 0) {
          ordersTable.textContent = "Chưa có đơn hàng.";
          return;
        }

        ordersTable.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>Mã đơn</th>
                <th>Ngày tạo</th>
                <th>Khách hàng</th>
                <th>Nhân viên bán</th>
                <th>Kỹ thuật viên</th>
                <th>Ca</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map((o) => `
                <tr>
                  <td>#${o.order_id}</td>
                  <td>${escapeHtml(o.created_at_text || "")}</td>
                  <td>${escapeHtml(o.customer_name || "")}</td>
                  <td>${escapeHtml(o.sales_rep_name || "Chưa gán")}</td>
                  <td>${escapeHtml(o.tech_name || "Chưa gán")}</td>
                  <td>${escapeHtml(o.shift_name || "Chưa gán")}</td>
                  <td>${Number(o.total_amount || 0).toLocaleString("vi-VN")} đ</td>
                  <td>
                    <select onchange="updateStatus(${o.order_id}, this.value)">
                      ${["pending", "confirmed", "mixing", "completed", "cancelled"].map((s) => `<option value="${s}" ${o.status === s ? "selected" : ""}>${s}</option>`).join("")}
                    </select>
                  </td>
                  <td><button class="inline-button" onclick="showDetail(${o.order_id})">Chi tiết/Gán ca</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          <div id="orderDetail" class="content-card"></div>
        `;
      }

      async function updateStatus(orderId, status) {
        const token = getAdminToken();
        const response = await fetch(API_ROUTES.UPDATE_ORDER_STATUS(orderId), {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
          body: JSON.stringify({ status }),
        });
        const data = await response.json();
        message.style.color = response.ok ? "green" : "red";
        message.textContent = data.message || data.error || "Đã xử lý.";
        await loadOrders();
      }

      async function ensureAssignmentData() {
        const token = getAdminToken();
        if (employeesCache.length && shiftsCache.length) return;

        const [employeesResponse, shiftsResponse] = await Promise.all([
          fetch(API_ROUTES.GET_EMPLOYEES, { headers: { Authorization: "Bearer " + token } }),
          fetch(API_ROUTES.GET_SHIFTS, { headers: { Authorization: "Bearer " + token } }),
        ]);

        employeesCache = employeesResponse.ok ? await employeesResponse.json() : [];
        shiftsCache = shiftsResponse.ok ? await shiftsResponse.json() : [];
      }

      function employeeOptions(selectedId, firstText) {
        return `<option value="">${firstText}</option>` + employeesCache.map((emp) => `
          <option value="${emp.employee_id}" ${Number(selectedId) === Number(emp.employee_id) ? "selected" : ""}>
            ${escapeHtml(emp.full_name)}${emp.job_title ? " - " + escapeHtml(emp.job_title) : ""}
          </option>
        `).join("");
      }

      function shiftOptions(selectedId) {
        return '<option value="">-- Chọn ca làm --</option>' + shiftsCache.map((s) => `
          <option value="${s.shift_id}" ${Number(selectedId) === Number(s.shift_id) ? "selected" : ""}>
            ${escapeHtml(s.shift_name)} (${escapeHtml(s.start_time)}-${escapeHtml(s.end_time)})
          </option>
        `).join("");
      }

      async function showDetail(orderId) {
        const token = getAdminToken();
        await ensureAssignmentData();

        const response = await fetch(API_ROUTES.GET_ORDER_DETAIL(orderId), {
          headers: { Authorization: "Bearer " + token },
        });
        const order = await response.json();
        const target = document.getElementById("orderDetail");
        if (!response.ok) {
          target.textContent = order.error || "Không thể tải chi tiết.";
          return;
        }

        target.innerHTML = `
          <h3>Chi tiết đơn #${order.order_id}</h3>
          <p><strong>Ngày tạo:</strong> ${escapeHtml(order.created_at_text || "")}</p>
          <p><strong>Khách hàng:</strong> ${escapeHtml(order.customer_name)} - ${escapeHtml(order.phone || "")}</p>
          <p><strong>Địa chỉ giao:</strong> ${escapeHtml([order.street_address, order.ward_name, order.province_name].filter(Boolean).join(", "))}</p>

          <div class="assignment-form">
            <label>Nhân viên bán hàng
              <select id="assignSales">${employeeOptions(order.sales_rep_id, "-- Chọn nhân viên bán --")}</select>
            </label>
            <label>Kỹ thuật viên pha màu
              <select id="assignTech">${employeeOptions(order.tech_id, "-- Chọn kỹ thuật viên --")}</select>
            </label>
            <label>Ca làm
              <select id="assignShift">${shiftOptions(order.shift_id)}</select>
            </label>
            <button class="inline-button" onclick="assignOrder(${order.order_id})">Lưu phân công</button>
          </div>

          <table class="data-table">
            <thead><tr><th>Sản phẩm</th><th>SKU</th><th>Base</th><th>Màu</th><th>SL</th><th>Giá bán</th><th>Thành tiền</th></tr></thead>
            <tbody>
              ${order.details.map((d) => `
                <tr>
                  <td>${escapeHtml(d.brand_name)} - ${escapeHtml(d.line_name)} ${escapeHtml(d.volume || "")}</td>
                  <td>${escapeHtml(d.sku_code)}</td>
                  <td>${escapeHtml(d.base_name)}</td>
                  <td>${escapeHtml(d.color_code)} - ${escapeHtml(d.color_name)}</td>
                  <td>${d.quantity}</td>
                  <td>${Number(d.price_at_sale || 0).toLocaleString("vi-VN")} đ</td>
                  <td>${Number(d.line_total || d.quantity * d.price_at_sale || 0).toLocaleString("vi-VN")} đ</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      async function assignOrder(orderId) {
        const token = getAdminToken();
        const payload = {
          sales_rep_id: document.getElementById("assignSales").value || null,
          tech_id: document.getElementById("assignTech").value || null,
          shift_id: document.getElementById("assignShift").value || null,
        };

        const response = await fetch(API_ROUTES.ASSIGN_ORDER(orderId), {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        message.style.color = response.ok ? "green" : "red";
        message.textContent = data.message || data.error || "Đã xử lý.";
        await loadOrders();
        if (response.ok) await showDetail(orderId);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      loadOrders();
    </script>
  </body>
</html>
