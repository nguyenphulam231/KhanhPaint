<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý dòng sản phẩm</title>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị sản phẩm</p>
            <h1>Thêm dòng sản phẩm mới</h1>
          </div>
        </div>

        <section class="admin-card">
          <div class="form-section">
            <select id="brandSelect" required>
              <option value="">-- Chọn thương hiệu --</option>
            </select>
            <input type="text" id="lineName" placeholder="Tên dòng sản phẩm" required />
            <select id="isInterior">
              <option value="1">Nội thất</option>
              <option value="0">Ngoại thất</option>
            </select>
            <input type="text" id="lineDesc" placeholder="Mô tả dòng sản phẩm" />
            <button id="saveLineBtn" type="button">Lưu dòng sản phẩm</button>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("lines");
      initAdminShell();
      loadBrandsIntoSelect("brandSelect");

      document.getElementById("saveLineBtn").addEventListener("click", async () => {
        const data = {
          brand_id: document.getElementById("brandSelect").value,
          name: document.getElementById("lineName").value,
          is_interior: document.getElementById("isInterior").value,
          description: document.getElementById("lineDesc").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_LINE, {
            method: "POST",
            body: JSON.stringify(data),
          });
          alert("Đã thêm dòng sản phẩm!");
          window.location.href = "/admin/";
        } catch (error) {
          alert(error.message || "Lỗi khi thêm dòng sản phẩm!");
        }
      });
    </script>
  </body>
</html>
