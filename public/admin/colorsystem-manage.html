<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý Mã màu & Công thức</title>
    <style>
      .formula-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        align-items: center;
      }
      .colorant-select {
        flex: 3;
      }
      .amount-input {
        flex: 1;
      }
      .btn-remove {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 0 !important;
        width: 28px !important;
        height: 28px !important;
        cursor: pointer;
        border-radius: 4px;
        display: flex !important;
        align-items: center;
        justify-content: center;
      }
      .btn-add-formula {
        background-color: #17a2b8;
        color: white;
        border: none;
        padding: 8px 15px;
        cursor: pointer;
        border-radius: 4px;
        margin-bottom: 15px;
      }
      .btn-action {
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 12px;
        margin-right: 5px;
        font-weight: bold;
      }
      .btn-view {
        background-color: #007bff;
      }
      .btn-edit {
        background-color: #ffc107;
        color: #000;
      }
      .btn-delete {
        background-color: #dc3545;
      }
      .btn-cancel {
        background-color: #6c757d;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        display: block;
        width: 100%;
        margin-top: 5px;
      }
      .d-none {
        display: none !important;
      }

      /* Modal Style */
      #formulaModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        width: 400px;
        max-width: 90%;
      }

      .filter-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
        margin-bottom: 16px;
      }
      .filter-grid > div {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 160px;
        flex: 1;
      }
      .filter-grid label {
        font-size: 12px;
        font-weight: bold;
        color: #555;
      }
      .filter-grid input,
      .filter-grid select {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        width: 100%;
        box-sizing: border-box;
        margin: 0;
      }
      .filter-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .btn-filter {
        background-color: #0d6efd;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      .btn-reset-filter {
        background-color: #6c757d;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-delete-selected {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>
      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị danh mục</p>
            <h1 id="formTitle">Hệ thống Mã màu & Công thức pha</h1>
          </div>
        </div>

        <section class="admin-card" style="margin-bottom: 2rem">
          <h3 id="sectionFormTitle">Thêm mã màu mới</h3>
          <div class="form-section">
            <input
              type="text"
              id="colorCode"
              placeholder="Mã màu (VD: AP102)"
              required
            />
            <input
              type="text"
              id="colorName"
              placeholder="Tên màu (VD: Xanh ngọc bích)"
              required
            />
            <select id="baseIdSelect" required>
              <option value="">-- Chọn Cốt sơn (Base) --</option>
            </select>
            <div
              style="
                margin-top: 15px;
                border-top: 1px solid #ddd;
                padding-top: 15px;
              "
            >
              <h4>Công thức pha (trên 1 Lít sơn)</h4>
              <div id="formulaContainer"></div>
              <button
                type="button"
                class="btn-add-formula"
                id="addFormulaRowBtn"
              >
                + Thêm loại tinh màu
              </button>
            </div>
            <button
              id="saveColorBtn"
              type="button"
              style="
                width: 100%;
                font-weight: bold;
                background-color: #28a745;
                color: white;
                padding: 10px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              Lưu mã màu & Công thức
            </button>
            <button id="cancelEditBtn" type="button" class="btn-cancel d-none">
              Hủy chế độ sửa
            </button>
          </div>
        </section>

        <section class="admin-card">
          <h3>Danh sách Hệ thống màu</h3>

          <!-- Bộ lọc -->
          <div class="filter-grid">
            <div>
              <label>Mã màu</label>
              <input type="text" id="filterCode" placeholder="VD: AP102..." />
            </div>
            <div>
              <label>Tên màu</label>
              <input
                type="text"
                id="filterName"
                placeholder="VD: Xanh ngọc..."
              />
            </div>
            <div>
              <label>Cốt sơn (Base)</label>
              <select id="filterBase">
                <option value="">-- Tất cả --</option>
              </select>
            </div>
          </div>

          <div class="filter-actions">
            <button class="btn-filter" id="applyFilterBtn">Lọc</button>
            <button class="btn-reset-filter" id="resetFilterBtn">Bỏ lọc</button>
            <label
              style="
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
                margin-left: 8px;
              "
            >
              <input
                type="checkbox"
                id="selectAllCheck"
                style="width: auto; margin: 0; transform: scale(1.2)"
              />
              <span style="font-size: 14px">Chọn tất cả</span>
            </label>
            <button class="btn-delete-selected" id="deleteSelectedBtn">
              Xóa đã chọn (<span id="selectedCount">0</span>)
            </button>
          </div>

          <table
            style="width: 100%; border-collapse: collapse; text-align: left"
          >
            <thead>
              <tr style="border-bottom: 2px solid #ddd; height: 40px">
                <th style="width: 40px"></th>
                <th>ID</th>
                <th>Mã màu</th>
                <th>Tên màu</th>
                <th>Base</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="colorListBody">
              <tr>
                <td colspan="6" style="text-align: center; padding: 20px">
                  Đang tải danh sách hệ màu...
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <div id="formulaModal">
      <div class="modal-content">
        <h3 id="modalTitle">Công thức pha</h3>
        <ul id="formulaList" style="padding-left: 20px; margin: 15px 0"></ul>
        <button
          style="width: 100%; padding: 8px; cursor: pointer"
          onclick="
            document.getElementById('formulaModal').style.display = 'none'
          "
        >
          Đóng
        </button>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("colorsystem");
      initAdminShell();

      const formulaContainer = document.getElementById("formulaContainer");
      const baseIdSelect = document.getElementById("baseIdSelect");
      const colorCodeInput = document.getElementById("colorCode");
      const colorNameInput = document.getElementById("colorName");
      const saveColorBtn = document.getElementById("saveColorBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const sectionFormTitle = document.getElementById("sectionFormTitle");

      let availableColorants = [];
      let editingColorId = null;
      let currentFilterParams = {};

      // ── 1. Tải tinh màu cho select ───────────────────────────────────────────
      async function loadColorantsForSelect() {
        try {
          const res = await fetch(API_ROUTES.GET_COLORANTS, {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          if (res.ok) availableColorants = await res.json();
        } catch (err) {
          console.error("Lỗi lấy danh sách tinh màu:", err);
        }
      }

      // ── 2. Tải BaseTypes (form + filter) ────────────────────────────────────
      async function loadBaseTypes() {
        try {
          const res = await fetch("/api/admin/base", {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const bases = await res.json();

          baseIdSelect.innerHTML =
            '<option value="">-- Chọn Cốt sơn (Base) --</option>';
          document.getElementById("filterBase").innerHTML =
            '<option value="">-- Tất cả --</option>';

          bases.forEach((b) => {
            const opt = `<option value="${b.base_id}">${b.base_name}</option>`;
            baseIdSelect.innerHTML += opt;
            document.getElementById("filterBase").innerHTML += opt;
          });
        } catch (err) {
          console.error("Lỗi tải BaseTypes:", err);
        }
      }

      // ── 3. Thêm dòng công thức pha ───────────────────────────────────────────
      function addFormulaRow(selectedColorantId = "", amountValue = "") {
        const rowDiv = document.createElement("div");
        rowDiv.className = "formula-row";

        const options = availableColorants
          .map(
            (c) =>
              `<option value="${c.colorant_id}"
        ${selectedColorantId == c.colorant_id ? "selected" : ""}>
        ${c.colorant_name}
      </option>`,
          )
          .join("");

        rowDiv.innerHTML = `
      <select class="colorant-select">
        <option value="">-- Chọn Tinh màu --</option>${options}
      </select>
      <input type="number" class="amount-input"
        placeholder="ml/Lít" min="0" step="0.01" value="${amountValue}" />
      <button type="button" class="btn-remove">✕</button>
    `;
        rowDiv.querySelector(".btn-remove").addEventListener("click", () => {
          formulaContainer.removeChild(rowDiv);
        });
        formulaContainer.appendChild(rowDiv);
      }

      // ── 4. Xem công thức (Modal) ─────────────────────────────────────────────
      async function viewFormula(colorId, colorCode) {
        try {
          const res = await fetch(API_ROUTES.GET_FORMULA(colorId), {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const formula = await res.json();
          document.getElementById("modalTitle").innerText =
            `Công thức: ${colorCode}`;
          document.getElementById("formulaList").innerHTML = formula
            .map(
              (f) =>
                `<li><b>${f.colorant_name}:</b> ${f.amount_ml.toLocaleString("vi-VN")} ml</li>`,
            )
            .join("");
          document.getElementById("formulaModal").style.display = "flex";
        } catch (err) {
          alert("Không thể tải công thức chi tiết!");
        }
      }

      // ── 5. Tải danh sách màu (có filter) ────────────────────────────────────
      async function loadColorSystem(params = {}) {
        currentFilterParams = params;
        const query = new URLSearchParams();
        if (params.color_code) query.append("color_code", params.color_code);
        if (params.color_name) query.append("color_name", params.color_name);
        if (params.base_id) query.append("base_id", params.base_id);

        const url =
          API_ROUTES.GET_COLORSYSTEM +
          (query.toString() ? "?" + query.toString() : "");

        try {
          const res = await fetch(url, {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          let data = await res.json();
          const tbody = document.getElementById("colorListBody");

          if (data && !Array.isArray(data) && Array.isArray(data.data)) {
            data = data.data;
          }
          if (!Array.isArray(data)) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red; padding:20px;">
          Lỗi dữ liệu: ${data?.error || "Unknown Error"}</td></tr>`;
            return;
          }

          // Reset checkbox
          document.getElementById("selectAllCheck").checked = false;
          document.getElementById("deleteSelectedBtn").style.display = "none";
          document.getElementById("selectedCount").textContent = "0";

          if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px;">
          Không có mã màu nào phù hợp.</td></tr>`;
            return;
          }

          tbody.innerHTML = data
            .map((item) => {
              const escapedCode = (item.color_code || "").replace(/'/g, "\\'");
              const escapedName = (item.color_name || "").replace(/'/g, "\\'");
              return `
          <tr style="border-bottom: 1px solid #eee; height:40px;">
            <td style="text-align:center;">
              <input type="checkbox" class="row-check"
                data-id="${item.color_id}"
                data-code="${escapedCode}"
                style="width:auto; margin:0; transform:scale(1.2); cursor:pointer;" />
            </td>
            <td>#${item.color_id}</td>
            <td><code><strong>${item.color_code}</strong></code></td>
            <td><b>${item.color_name}</b></td>
            <td><span class="badge">${item.base_name || "N/A"}</span></td>
            <td>
              <button class="btn-action btn-view"
                onclick="viewFormula(${item.color_id}, '${escapedCode}')">Xem CT</button>
              <button class="btn-action btn-edit"
                onclick="prepareEdit(${item.color_id}, '${escapedCode}', '${escapedName}', ${item.base_id})">Sửa</button>
              <button class="btn-action btn-delete"
                onclick="deleteColorSystem(${item.color_id}, '${escapedCode}')">Xóa</button>
            </td>
          </tr>`;
            })
            .join("");

          document.querySelectorAll(".row-check").forEach((chk) => {
            chk.addEventListener("change", updateDeleteSelectedBtn);
          });
        } catch (err) {
          console.error("Lỗi fetch hệ màu:", err);
          document.getElementById("colorListBody").innerHTML =
            `<tr><td colspan="6" style="text-align:center; color:red; padding:20px;">
          Không thể kết nối đến máy chủ!</td></tr>`;
        }
      }

      // ── Cập nhật nút xóa đã chọn ────────────────────────────────────────────
      function updateDeleteSelectedBtn() {
        const checked = document.querySelectorAll(".row-check:checked");
        const all = document.querySelectorAll(".row-check");
        const btn = document.getElementById("deleteSelectedBtn");
        document.getElementById("selectedCount").textContent = checked.length;
        btn.style.display = checked.length > 0 ? "inline-block" : "none";
        document.getElementById("selectAllCheck").checked =
          all.length > 0 && checked.length === all.length;
      }

      // ── Chọn tất cả ─────────────────────────────────────────────────────────
      document
        .getElementById("selectAllCheck")
        .addEventListener("change", function () {
          document.querySelectorAll(".row-check").forEach((chk) => {
            chk.checked = this.checked;
          });
          updateDeleteSelectedBtn();
        });

      // ── Nút Lọc ─────────────────────────────────────────────────────────────
      document
        .getElementById("applyFilterBtn")
        .addEventListener("click", () => {
          loadColorSystem({
            color_code: document.getElementById("filterCode").value.trim(),
            color_name: document.getElementById("filterName").value.trim(),
            base_id: document.getElementById("filterBase").value,
          });
        });

      // ── Nút Bỏ lọc ──────────────────────────────────────────────────────────
      document
        .getElementById("resetFilterBtn")
        .addEventListener("click", () => {
          document.getElementById("filterCode").value = "";
          document.getElementById("filterName").value = "";
          document.getElementById("filterBase").value = "";
          loadColorSystem();
        });

      // ── Xóa nhiều ───────────────────────────────────────────────────────────
      document
        .getElementById("deleteSelectedBtn")
        .addEventListener("click", async () => {
          const checked = [...document.querySelectorAll(".row-check:checked")];
          if (!checked.length) return;
          if (
            !confirm(
              `Xóa ${checked.length} mã màu đã chọn?\nHành động này sẽ xóa vĩnh viễn toàn bộ công thức pha liên kết.`,
            )
          )
            return;

          let successCount = 0;
          let failCount = 0;

          for (const chk of checked) {
            try {
              const res = await fetch(API_ROUTES.DELETE_COLOR(chk.dataset.id), {
                method: "DELETE",
                headers: { Authorization: "Bearer " + getAdminToken() },
              });
              if (res.ok) successCount++;
              else failCount++;
            } catch {
              failCount++;
            }
          }

          alert(
            `Đã xóa ${successCount} mã màu thành công.${failCount > 0 ? `\n${failCount} thất bại.` : ""}`,
          );
          loadColorSystem(currentFilterParams);
        });

      // ── 6. Chuẩn bị sửa ─────────────────────────────────────────────────────
      async function prepareEdit(colorId, colorCode, colorName, baseId) {
        editingColorId = colorId;
        sectionFormTitle.innerText = `Chỉnh sửa mã màu [ ${colorCode} ]`;
        colorCodeInput.value = colorCode;
        colorNameInput.value = colorName;
        baseIdSelect.value = baseId;
        formulaContainer.innerHTML = "";

        try {
          const res = await fetch(API_ROUTES.GET_FORMULA(colorId), {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const formulaDetails = await res.json();
          if (formulaDetails && formulaDetails.length > 0) {
            formulaDetails.forEach((item) =>
              addFormulaRow(item.colorant_id, item.amount_ml),
            );
          } else {
            addFormulaRow();
          }
        } catch (err) {
          console.error("Lỗi nạp công thức:", err);
          addFormulaRow();
        }

        saveColorBtn.innerText = "Cập nhật mã màu & Công thức";
        saveColorBtn.style.backgroundColor = "#ffc107";
        saveColorBtn.style.color = "#000";
        cancelEditBtn.classList.remove("d-none");
        colorCodeInput.focus();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // ── Reset form ───────────────────────────────────────────────────────────
      function resetForm() {
        editingColorId = null;
        sectionFormTitle.innerText = "Thêm mã màu mới";
        colorCodeInput.value = "";
        colorNameInput.value = "";
        baseIdSelect.value = "";
        formulaContainer.innerHTML = "";
        addFormulaRow();
        saveColorBtn.innerText = "Lưu mã màu & Công thức";
        saveColorBtn.style.backgroundColor = "#28a745";
        saveColorBtn.style.color = "white";
        cancelEditBtn.classList.add("d-none");
      }

      cancelEditBtn.addEventListener("click", resetForm);

      // ── 7. Xóa 1 mã màu ─────────────────────────────────────────────────────
      async function deleteColorSystem(colorId, colorCode) {
        if (
          !confirm(
            `Xóa mã màu [ ${colorCode} ]?\nSẽ xóa vĩnh viễn toàn bộ công thức pha liên kết.`,
          )
        )
          return;
        try {
          const res = await fetch(API_ROUTES.DELETE_COLOR(colorId), {
            method: "DELETE",
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const result = await res.json().catch(() => null);
          if (res.ok) {
            alert("Đã xóa mã màu và công thức liên quan thành công!");
            if (editingColorId === colorId) resetForm();
            loadColorSystem(currentFilterParams);
          } else {
            alert(result?.error || "Lỗi xảy ra khi thực hiện xóa!");
          }
        } catch (err) {
          console.error("Lỗi xóa:", err);
        }
      }

      // ── 8. Thêm dòng tinh màu ───────────────────────────────────────────────
      document
        .getElementById("addFormulaRowBtn")
        .addEventListener("click", () => addFormulaRow());

      // ── 9. Lưu (thêm / cập nhật) ────────────────────────────────────────────
      saveColorBtn.addEventListener("click", async () => {
        const codeValue = colorCodeInput.value.trim();
        const nameValue = colorNameInput.value.trim();
        const baseValue = baseIdSelect.value;

        if (!codeValue || !nameValue || !baseValue) {
          alert("Vui lòng điền đầy đủ Mã màu, Tên màu và Cốt sơn Base!");
          return;
        }

        const formula = Array.from(document.querySelectorAll(".formula-row"))
          .map((row) => ({
            colorant_id: parseInt(row.querySelector(".colorant-select").value),
            amount_ml: parseFloat(row.querySelector(".amount-input").value),
          }))
          .filter(
            (f) => f.colorant_id && !isNaN(f.amount_ml) && f.amount_ml > 0,
          );

        const payload = {
          color_code: codeValue,
          color_name: nameValue,
          base_id: parseInt(baseValue),
          formula,
        };

        const url = editingColorId
          ? API_ROUTES.UPDATE_COLOR(editingColorId)
          : API_ROUTES.ADD_COLORSYSTEM;
        const method = editingColorId ? "PUT" : "POST";

        try {
          const res = await fetch(url, {
            method,
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + getAdminToken(),
            },
            body: JSON.stringify(payload),
          });
          const result = await res.json().catch(() => null);
          if (res.ok) {
            alert(
              editingColorId
                ? "Cập nhật mã màu thành công!"
                : "Thêm mã màu & công thức thành công!",
            );
            resetForm();
            loadColorSystem(currentFilterParams);
          } else {
            alert(result?.error || "Có lỗi phát sinh khi xử lý dữ liệu!");
          }
        } catch (err) {
          console.error("Lỗi:", err);
          alert("Lỗi kết nối đến server!");
        }
      });

      // ── 10. Khởi động ───────────────────────────────────────────────────────
      window.addEventListener("DOMContentLoaded", async () => {
        await loadColorantsForSelect();
        await loadBaseTypes();
        await loadColorSystem();
        addFormulaRow();
      });
    </script>
  </body>
</html>
