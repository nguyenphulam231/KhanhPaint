<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý Mã màu & Công thức</title>
    <style>
      .formula-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        align-items: center;
      }
      .colorant-select {
        flex: 3;
      }
      .amount-input {
        flex: 1;
      }
      .btn-remove {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 0 !important;
        width: 28px !important;
        height: 28px !important;
        cursor: pointer;
        border-radius: 4px;
        display: flex !important;
        align-items: center;
        justify-content: center;
      }
      .btn-add-formula {
        background-color: #17a2b8;
        color: white;
        border: none;
        padding: 8px 15px;
        cursor: pointer;
        border-radius: 4px;
        margin-bottom: 15px;
      }
      .btn-action {
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 12px;
        margin-right: 5px;
        font-weight: bold;
      }
      .btn-view {
        background-color: #007bff;
      }
      .btn-edit {
        background-color: #ffc107;
        color: #000;
      }
      .btn-delete {
        background-color: #dc3545;
      }
      .btn-cancel {
        background-color: #6c757d;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        display: block;
        width: 100%;
        margin-top: 5px;
      }
      .d-none {
        display: none !important;
      }

      /* Modal Style */
      #formulaModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        width: 400px;
        max-width: 90%;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>
      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị danh mục</p>
            <h1 id="formTitle">Hệ thống Mã màu & Công thức pha</h1>
          </div>
        </div>

        <section class="admin-card" style="margin-bottom: 2rem">
          <h3 id="sectionFormTitle">Thêm mã màu mới</h3>
          <div class="form-section">
            <input
              type="text"
              id="colorCode"
              placeholder="Mã màu (VD: AP102)"
              required
            />
            <input
              type="text"
              id="colorName"
              placeholder="Tên màu (VD: Xanh ngọc bích)"
              required
            />
            <select id="baseIdSelect" required>
              <option value="">-- Chọn Cốt sơn (Base) --</option>
            </select>
            <div
              style="
                margin-top: 15px;
                border-top: 1px solid #ddd;
                padding-top: 15px;
              "
            >
              <h4>Công thức pha (trên 1 Lít sơn)</h4>
              <div id="formulaContainer"></div>
              <button
                type="button"
                class="btn-add-formula"
                id="addFormulaRowBtn"
              >
                + Thêm loại tinh màu
              </button>
            </div>
            <button
              id="saveColorBtn"
              type="button"
              style="
                width: 100%;
                font-weight: bold;
                background-color: #28a745;
                color: white;
                padding: 10px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              Lưu mã màu & Công thức
            </button>
            <button id="cancelEditBtn" type="button" class="btn-cancel d-none">
              Hủy chế độ sửa
            </button>
          </div>
        </section>

        <section class="admin-card">
          <h3>Danh sách Hệ thống màu</h3>
          <table
            style="width: 100%; border-collapse: collapse; text-align: left"
          >
            <thead>
              <tr style="border-bottom: 2px solid #ddd; height: 40px">
                <th>ID</th>
                <th>Mã màu</th>
                <th>Tên màu</th>
                <th>Base</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="colorListBody">
              <tr>
                <td colspan="5" style="text-align: center; padding: 20px">
                  Đang tải danh sách hệ màu...
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <div id="formulaModal">
      <div class="modal-content">
        <h3 id="modalTitle">Công thức pha</h3>
        <ul id="formulaList" style="padding-left: 20px; margin: 15px 0"></ul>
        <button
          style="width: 100%; padding: 8px; cursor: pointer"
          onclick="
            document.getElementById('formulaModal').style.display = 'none'
          "
        >
          Đóng
        </button>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("colorsystem");
      initAdminShell();

      const formulaContainer = document.getElementById("formulaContainer");
      const baseIdSelect = document.getElementById("baseIdSelect");
      const colorCodeInput = document.getElementById("colorCode");
      const colorNameInput = document.getElementById("colorName");
      const saveColorBtn = document.getElementById("saveColorBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const sectionFormTitle = document.getElementById("sectionFormTitle");

      let availableColorants = [];
      let editingColorId = null;

      // 1. Tải danh sách tinh màu phục vụ thẻ Select
      async function loadColorantsForSelect() {
        try {
          const response = await fetch(API_ROUTES.GET_COLORANTS, {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          if (response.ok) availableColorants = await response.json();
        } catch (error) {
          console.error("Lỗi lấy danh sách tinh màu:", error);
        }
      }

      // 2. Tải danh sách cốt Base sơn
      async function loadBaseTypes() {
        try {
          const response = await fetch("/api/admin/base", {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const bases = await response.json();
          baseIdSelect.innerHTML =
            '<option value="">-- Chọn Cốt sơn (Base) --</option>';
          bases.forEach((b) => {
            baseIdSelect.innerHTML += `<option value="${b.base_id}">${b.base_name}</option>`;
          });
        } catch (err) {
          console.error("Lỗi tải danh sách BaseTypes:", err);
        }
      }

      // 3. Hàm tạo thêm một dòng công thức pha động
      function addFormulaRow(selectedColorantId = "", amountValue = "") {
        const rowDiv = document.createElement("div");
        rowDiv.className = "formula-row";

        let options = availableColorants
          .map(
            (c) =>
              `<option value="${c.colorant_id}" ${selectedColorantId == c.colorant_id ? "selected" : ""}>${c.colorant_name}</option>`,
          )
          .join("");

        rowDiv.innerHTML = `
          <select class="colorant-select"><option value="">-- Chọn Tinh màu --</option>${options}</select>
          <input type="number" class="amount-input" placeholder="ml/Lít" min="0" step="0.01" value="${amountValue}">
          <button type="button" class="btn-remove">✕</button>
        `;

        rowDiv.querySelector(".btn-remove").addEventListener("click", () => {
          formulaContainer.removeChild(rowDiv);
        });
        formulaContainer.appendChild(rowDiv);
      }

      // 4. Hàm xem nhanh công thức màu (Modal)
      async function viewFormula(colorId, colorCode) {
        try {
          const response = await fetch(API_ROUTES.GET_FORMULA(colorId), {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const formula = await response.json();
          document.getElementById("modalTitle").innerText =
            `Công thức: ${colorCode}`;
          document.getElementById("formulaList").innerHTML = formula
            .map(
              (f) =>
                `<li><b>${f.colorant_name}:</b> ${f.amount_ml.toLocaleString("vi-VN")} ml</li>`,
            )
            .join("");
          document.getElementById("formulaModal").style.display = "flex";
        } catch (err) {
          alert("Không thể tải công thức chi tiết!");
        }
      }

      // 5. Hàm tải toàn bộ danh sách Hệ thống màu lên bảng
      // 5. Hàm tải toàn bộ danh sách Hệ thống màu lên bảng (Đã sửa lỗi chống crash .map)
      async function loadColorSystem() {
        try {
          const response = await fetch(API_ROUTES.GET_COLORSYSTEM, {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });

          let data = await response.json();
          const tbody = document.getElementById("colorListBody");

          // BẢO VỆ FORM: Nếu backend bọc data trong object { success: true, data: [...] }
          if (data && !Array.isArray(data) && Array.isArray(data.data)) {
            data = data.data;
          }

          // Kiểm tra nếu dữ liệu vẫn không phải là mảng (có thể là object lỗi { error: "..." })
          if (!Array.isArray(data)) {
            console.error(
              "Dữ liệu trả về không hợp lệ (không phải Array):",
              data,
            );
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red; padding: 20px;">Lỗi: Dữ liệu hệ màu không đúng cấu trúc hoặc lỗi xác thực! (${data?.error || "Unknown Error"})</td></tr>`;
            return;
          }

          if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;">Hệ thống chưa cấu hình mã màu nào.</td></tr>`;
            return;
          }

          tbody.innerHTML = data
            .map((item) => {
              const escapedCode = (item.color_code || "").replace(/'/g, "\\'");
              const escapedName = (item.color_name || "").replace(/'/g, "\\'");
              return `
                <tr style="border-bottom: 1px solid #eee; height: 40px;">
                  <td>#${item.color_id}</td>
                  <td><code><strong>${item.color_code}</strong></code></td>
                  <td><b>${item.color_name}</b></td>
                  <td><span class="badge">${item.base_name || "N/A"}</span></td>
                  <td>
                    <button class="btn-action btn-view" onclick="viewFormula(${item.color_id}, '${escapedCode}')">Xem CT</button>
                    <button class="btn-action btn-edit" onclick="prepareEdit(${item.color_id}, '${escapedCode}', '${escapedName}', ${item.base_id})">Sửa</button>
                    <button class="btn-action btn-delete" onclick="deleteColorSystem(${item.color_id}, '${escapedCode}')">Xóa</button>
                  </td>
                </tr>
              `;
            })
            .join("");
        } catch (error) {
          console.error("Lỗi khi fetch danh sách hệ màu:", error);
          document.getElementById("colorListBody").innerHTML =
            `<tr><td colspan="5" style="text-align: center; color: red; padding: 20px;">Không thể kết nối đến máy chủ!</td></tr>`;
        }
      }

      // 6. Xử lý chuẩn bị dữ liệu cập nhật công thức (Đẩy ngược lên Form)
      async function prepareEdit(colorId, colorCode, colorName, baseId) {
        editingColorId = colorId;
        sectionFormTitle.innerText = `Chỉnh sửa mã màu [ ${colorCode} ]`;

        colorCodeInput.value = colorCode;
        colorNameInput.value = colorName;
        baseIdSelect.value = baseId;

        // Xóa trắng cấu trúc công thức cũ trên Form trước khi nạp dữ liệu chi tiết
        formulaContainer.innerHTML = "";

        try {
          // Lấy cấu trúc mảng công thức thành phần từ backend
          const response = await fetch(API_ROUTES.GET_FORMULA(colorId), {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const formulaDetails = await response.json();

          if (formulaDetails && formulaDetails.length > 0) {
            formulaDetails.forEach((item) => {
              addFormulaRow(item.colorant_id, item.amount_ml);
            });
          } else {
            addFormulaRow();
          }
        } catch (err) {
          console.error("Lỗi nạp chi tiết công thức:", err);
          addFormulaRow();
        }

        saveColorBtn.innerText = "Cập nhật mã màu & Công thức";
        saveColorBtn.style.backgroundColor = "#ffc107";
        saveColorBtn.style.color = "#000";
        cancelEditBtn.classList.remove("d-none");
        colorCodeInput.focus();
      }

      // Hàm dọn dẹp Form đưa về trạng thái thêm mới ban đầu
      function resetForm() {
        editingColorId = null;
        sectionFormTitle.innerText = "Thêm mã màu mới";
        colorCodeInput.value = "";
        colorNameInput.value = "";
        baseIdSelect.value = "";
        formulaContainer.innerHTML = "";
        addFormulaRow(); // Để sẵn một hàng trống mặc định

        saveColorBtn.innerText = "Lưu mã màu & Công thức";
        saveColorBtn.style.backgroundColor = "#28a745";
        saveColorBtn.style.color = "white";
        cancelEditBtn.classList.add("d-none");
      }

      cancelEditBtn.addEventListener("click", resetForm);

      // 7. Chức năng xóa mã màu hoàn toàn khỏi hệ thống (Xóa Master-Detail)
      async function deleteColorSystem(colorId, colorCode) {
        const token = getAdminToken();
        if (!token) return;

        if (
          !confirm(
            `Bạn chắc chắn muốn xóa mã màu [ ${colorCode} ]?\nHành động này sẽ xóa vĩnh viễn toàn bộ công thức pha tinh màu liên kết.`,
          )
        )
          return;

        try {
          const response = await fetch(API_ROUTES.DELETE_COLOR(colorId), {
            method: "DELETE",
            headers: { Authorization: "Bearer " + token },
          });
          const result = await response.json().catch(() => null);

          if (response.ok) {
            alert("Đã xóa mã màu và công thức liên quan thành công!");
            if (editingColorId === colorId) resetForm();
            loadColorSystem();
          } else {
            alert(result?.error || "Lỗi xảy ra khi thực hiện xóa!");
          }
        } catch (err) {
          console.error("Lỗi kết nối xóa hệ màu:", err);
        }
      }

      // 8. Kích hoạt thêm dòng tinh màu khi click nút
      document
        .getElementById("addFormulaRowBtn")
        .addEventListener("click", () => addFormulaRow());

      // 9. Xử lý nút Lưu (Thêm mới POST hoặc Cập nhật PUT tùy theo flag editingColorId)
      saveColorBtn.addEventListener("click", async () => {
        const codeValue = colorCodeInput.value.trim();
        const nameValue = colorNameInput.value.trim();
        const baseValue = baseIdSelect.value;

        if (!codeValue || !nameValue || !baseValue) {
          alert("Vui lòng điền đầy đủ Mã màu, Tên màu và Cốt sơn Base!");
          return;
        }

        // Đóng gói mảng dữ liệu công thức từ các hàng giao diện
        const formula = Array.from(document.querySelectorAll(".formula-row"))
          .map((row) => ({
            colorant_id: parseInt(row.querySelector(".colorant-select").value),
            amount_ml: parseFloat(row.querySelector(".amount-input").value),
          }))
          .filter(
            (f) => f.colorant_id && !isNaN(f.amount_ml) && f.amount_ml > 0,
          );

        const payload = {
          color_code: codeValue,
          color_name: nameValue,
          base_id: parseInt(baseValue),
          formula,
        };

        const token = getAdminToken();
        const url = editingColorId
          ? API_ROUTES.UPDATE_COLOR(editingColorId)
          : API_ROUTES.ADD_COLORSYSTEM;
        const method = editingColorId ? "PUT" : "POST";

        try {
          const response = await fetch(url, {
            method: method,
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify(payload),
          });

          const result = await response.json().catch(() => null);

          if (response.ok) {
            alert(
              editingColorId
                ? "Cập nhật mã màu thành công!"
                : "Thêm mã màu & công thức thành công!",
            );
            resetForm();
            loadColorSystem();
          } else {
            alert(
              result?.error || "Có lỗi phát sinh khi xử lý dữ liệu hệ màu!",
            );
          }
        } catch (err) {
          console.error("Lỗi:", err);
          alert("Lỗi kết nối dữ liệu đến server!");
        }
      });

      // 10. Khởi chạy khi tải trang hoàn tất
      window.addEventListener("DOMContentLoaded", async () => {
        await loadColorantsForSelect();
        await loadBaseTypes();
        await loadColorSystem();
        addFormulaRow(); // Khởi tạo sẵn một hàng công thức ban đầu
      });
    </script>
  </body>
</html>
