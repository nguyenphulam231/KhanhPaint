<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý BaseType</title>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị sản phẩm</p>
            <h1>Thêm BaseType mới</h1>
          </div>
        </div>

        <section class="admin-card">
          <div class="form-section">
            <input
              type="text"
              id="baseName"
              placeholder="Tên Base (VD: Base A, Base B)"
              required
            />
            <input
              type="text"
              id="baseDesc"
              placeholder="Mô tả cốt sơn (VD: Cốt đậm dùng cho màu tối)"
            />
            <button id="saveBaseBtn" type="button">Lưu BaseType</button>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("basetypes");
      initAdminShell();

      document
        .getElementById("saveBaseBtn")
        .addEventListener("click", async () => {
          const baseNameInput = document.getElementById("baseName").value;
          const baseDescInput = document.getElementById("baseDesc").value;

          if (!baseNameInput.trim()) {
            alert("Vui lòng điền tên BaseType!");
            return;
          }

          const response = await fetch(API_ROUTES.ADD_BASETYPE, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + getAdminToken(),
            },
            body: JSON.stringify({
              base_name: baseNameInput,
              description: baseDescInput,
            }),
          });

          const result = await response.json().catch(() => null);

          if (response.ok && result?.success) {
            alert("Đã thêm BaseType thành công!");
            window.location.href = "/admin/";
            return;
          }

          alert(result?.message || result?.error || "Lỗi khi thêm BaseType!");
        });
    </script>
  </body>
</html>
