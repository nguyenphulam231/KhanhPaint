<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý BaseType</title>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị sản phẩm</p>
            <h1>Thêm BaseType mới</h1>
          </div>
        </div>

        <section class="admin-card">
          <div class="form-section">
            <select id="brandSelect" required>
              <option value="">-- Chọn thương hiệu --</option>
            </select>
            <select id="lineSelect" required>
              <option value="">-- Chọn dòng sản phẩm --</option>
            </select>
            <input type="text" id="baseName" placeholder="Tên Base (VD: Base A, Base B)" required />
            <input type="number" step="0.01" id="coverageRate" placeholder="Độ phủ (m²/lít/lớp)" />
            <input type="text" id="dryingTime" placeholder="Thời gian khô (VD: 1-2 giờ)" />
            <select id="glossLevel">
              <option value="">-- Chọn độ bóng --</option>
              <option value="Mờ">Mờ</option>
              <option value="Vỏ trứng">Vỏ trứng</option>
              <option value="Bóng nhẹ">Bóng nhẹ</option>
              <option value="Bán bóng">Bán bóng</option>
              <option value="Siêu bóng">Siêu bóng</option>
            </select>
            <input type="text" id="recommendedLayers" placeholder="Số lớp khuyên dùng (VD: 2 lớp)" />
            <button id="saveBaseBtn" type="button">Lưu BaseType</button>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("basetypes");
      initAdminShell();
      loadBrandsIntoSelect("brandSelect");

      async function loadProductLinesByBrand(brandId) {
        const lineSelect = document.getElementById("lineSelect");
        lineSelect.innerHTML = '<option value="">-- Chọn dòng sản phẩm --</option>';
        if (!brandId) return;

        try {
          const lines = await apiRequest(`${API_ROUTES.GET_LINES_BY_BRAND}/${brandId}`);
          setSelectOptions(lineSelect, lines, "-- Chọn dòng sản phẩm --", "line_id", "name");
        } catch (error) {
          console.error("Không thể tải dòng sản phẩm:", error);
        }
      }

      document.getElementById("brandSelect").addEventListener("change", (event) => {
        loadProductLinesByBrand(event.target.value);
      });

      document.getElementById("saveBaseBtn").addEventListener("click", async () => {
        const data = {
          line_id: document.getElementById("lineSelect").value,
          base_name: document.getElementById("baseName").value,
          coverage_rate: document.getElementById("coverageRate").value,
          drying_time: document.getElementById("dryingTime").value,
          gloss_level: document.getElementById("glossLevel").value,
          recommended_layers: document.getElementById("recommendedLayers").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_BASETYPE, {
            method: "POST",
            body: JSON.stringify(data),
          });
          alert("Đã thêm BaseType thành công!");
          window.location.href = "/admin/";
        } catch (error) {
          alert(error.message || "Lỗi khi thêm BaseType!");
        }
      });
    </script>
  </body>
</html>
