<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý Product Variant</title>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị sản phẩm</p>
            <h1>Thêm Product Variant mới</h1>
          </div>
        </div>

        <section class="admin-card">
          <div class="form-section">
            <select id="brandSelect" required>
              <option value="">-- Chọn thương hiệu --</option>
            </select>
            <select id="lineSelect" required>
              <option value="">-- Chọn dòng sản phẩm --</option>
            </select>
            <select id="baseSelect" required>
              <option value="">-- Chọn BaseType --</option>
            </select>
            <input
              type="text"
              id="volume"
              placeholder="Dung tích (VD: 1L, 5L, 20L)"
            />
            <input
              type="text"
              id="skuCode"
              placeholder="Mã SKU (Mã sản phẩm)"
              required
            />
            <input
              type="number"
              step="0.01"
              id="unitPrice"
              placeholder="Giá bán"
              required
            />
            <input
              type="number"
              id="stockQuantity"
              placeholder="Số lượng tồn kho"
              required
            />
            <input
              type="text"
              id="warehouseLocation"
              placeholder="Vị trí kho (VD: A1, B3)"
            />
            <button id="saveVariantBtn" type="button">
              Lưu Product Variant
            </button>
          </div>
        </section>

        <section class="admin-card" style="margin-top: 30px">
          <h3>Danh sách Product Variants</h3>
          <table style="width: 100%; border-collapse: collapse">
            <thead>
              <tr style="background-color: #f5f5f5">
                <th style="border: 1px solid #ddd; padding: 8px">Variant ID</th>
                <th style="border: 1px solid #ddd; padding: 8px">Dòng SP</th>
                <th style="border: 1px solid #ddd; padding: 8px">BaseType</th>
                <th style="border: 1px solid #ddd; padding: 8px">Dung tích</th>
                <th style="border: 1px solid #ddd; padding: 8px">SKU Code</th>
                <th style="border: 1px solid #ddd; padding: 8px">Giá bán</th>
                <th style="border: 1px solid #ddd; padding: 8px">Tồn kho</th>
                <th style="border: 1px solid #ddd; padding: 8px">Vị trí kho</th>
                <th style="border: 1px solid #ddd; padding: 8px">Hành động</th>
              </tr>
            </thead>
            <tbody id="variantsTableBody">
              <tr>
                <td colspan="9" style="text-align: center; padding: 20px">
                  Đang tải dữ liệu...
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("variants");
      initAdminShell();

      // 1. Hàm load danh sách Brands
      async function loadBrands() {
        const token = getAdminToken();
        if (!token) return;

        try {
          const response = await fetch(API_ROUTES.GET_BRANDS, {
            headers: { Authorization: "Bearer " + token },
          });
          const brands = await response.json();

          const brandSelect = document.getElementById("brandSelect");
          brandSelect.innerHTML =
            '<option value="">-- Chọn thương hiệu --</option>';
          brands.forEach((brand) => {
            brandSelect.innerHTML += `<option value="${brand.brand_id}">${brand.name}</option>`;
          });
        } catch (err) {
          console.error("Lỗi tải danh sách thương hiệu:", err);
        }
      }

      // 2. Hàm load danh sách ProductLines theo Brand
      async function loadProductLinesByBrand(brandId) {
        const token = getAdminToken();
        if (!token) return;

        const lineSelect = document.getElementById("lineSelect");
        if (!brandId) {
          lineSelect.innerHTML =
            '<option value="">-- Chọn dòng sản phẩm --</option>';
          return;
        }

        try {
          const response = await fetch(
            `${API_ROUTES.GET_LINES_BY_BRAND}/${brandId}`,
            {
              headers: { Authorization: "Bearer " + token },
            },
          );
          const lines = await response.json();

          lineSelect.innerHTML =
            '<option value="">-- Chọn dòng sản phẩm --</option>';
          lines.forEach((line) => {
            lineSelect.innerHTML += `<option value="${line.line_id}">${line.name}</option>`;
          });
        } catch (err) {
          console.error("Lỗi tải danh sách dòng sản phẩm:", err);
        }
      }

      // 3. Hàm load danh sách BaseTypes
      async function loadBaseTypes() {
        const token = getAdminToken();
        if (!token) return;

        try {
          const response = await fetch("/api/admin/base", {
            headers: { Authorization: "Bearer " + token },
          });
          const bases = await response.json();

          const baseSelect = document.getElementById("baseSelect");
          baseSelect.innerHTML =
            '<option value="">-- Chọn BaseType --</option>';
          bases.forEach((base) => {
            baseSelect.innerHTML += `<option value="${base.base_id}">${base.base_name}</option>`;
          });
        } catch (err) {
          console.error("Lỗi tải danh sách BaseTypes:", err);
        }
      }

      // 4. Hàm load danh sách variants
      async function loadVariants() {
        const token = getAdminToken();
        if (!token) return;

        try {
          const response = await fetch(API_ROUTES.GET_VARIANTS, {
            headers: { Authorization: "Bearer " + token },
          });
          const variants = await response.json();

          const tbody = document.getElementById("variantsTableBody");
          if (variants.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="9" style="text-align: center; padding: 20px">Chưa có product variant nào</td></tr>';
            return;
          }

          tbody.innerHTML = variants
            .map(
              (v) => `
                <tr>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.variant_id}</td>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.line_name}</td>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.base_name}</td>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.volume || "-"}</td>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.sku_code}</td>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.unit_price.toLocaleString("vi-VN")} VND</td>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.stock_quantity}</td>
                  <td style="border: 1px solid #ddd; padding: 8px">${v.warehouse_location || "-"}</td>
                  <td style="border: 1px solid #ddd; padding: 8px">
                    <button onclick="deleteVariant(${v.variant_id})" style="color: red; cursor: pointer; border: none; background: none; text-decoration: underline">Xóa</button>
                  </td>
                </tr>
              `,
            )
            .join("");
        } catch (err) {
          console.error("Lỗi tải danh sách variants:", err);
        }
      }

      // 5. Hàm xóa variant
      async function deleteVariant(variantId) {
        const token = getAdminToken();
        if (!token) return;

        if (!confirm("Bạn chắc chắn muốn xóa product variant này?")) return;

        try {
          const response = await fetch(
            `${API_ROUTES.DELETE_VARIANT}/${variantId}`,
            {
              method: "DELETE",
              headers: { Authorization: "Bearer " + token },
            },
          );

          if (response.ok) {
            alert("Xóa product variant thành công!");
            loadVariants();
          } else {
            alert("Lỗi khi xóa product variant!");
          }
        } catch (err) {
          console.error("Lỗi:", err);
        }
      }

      // 6. Xử lý event khi chọn Brand
      document.getElementById("brandSelect").addEventListener("change", (e) => {
        loadProductLinesByBrand(e.target.value);
      });

      // 7. Xử lý nút lưu
      document
        .getElementById("saveVariantBtn")
        .addEventListener("click", async () => {
          const lineId = document.getElementById("lineSelect").value;
          const baseId = document.getElementById("baseSelect").value;
          const volume = document.getElementById("volume").value;
          const skuCode = document.getElementById("skuCode").value;
          const unitPrice = document.getElementById("unitPrice").value;
          const stockQuantity = document.getElementById("stockQuantity").value;
          const warehouseLocation =
            document.getElementById("warehouseLocation").value;

          if (!lineId || !baseId || !skuCode || !unitPrice || !stockQuantity) {
            alert("Vui lòng điền đầy đủ các trường bắt buộc!");
            return;
          }

          const token = getAdminToken();
          if (!token) return;

          const data = {
            line_id: parseInt(lineId),
            base_id: parseInt(baseId),
            volume: volume || null,
            sku_code: skuCode,
            unit_price: parseFloat(unitPrice),
            stock_quantity: parseInt(stockQuantity),
            warehouse_location: warehouseLocation || null,
          };

          try {
            const response = await fetch(API_ROUTES.ADD_VARIANT, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
              body: JSON.stringify(data),
            });

            if (response.ok) {
              alert("Thêm product variant thành công!");
              // Reset form
              document.getElementById("lineSelect").value = "";
              document.getElementById("baseSelect").value = "";
              document.getElementById("volume").value = "";
              document.getElementById("skuCode").value = "";
              document.getElementById("unitPrice").value = "";
              document.getElementById("stockQuantity").value = "";
              document.getElementById("warehouseLocation").value = "";
              // Reload danh sách
              loadVariants();
            } else {
              alert("Lỗi khi thêm product variant!");
            }
          } catch (err) {
            console.error("Lỗi:", err);
            alert("Lỗi kết nối tới máy chủ!");
          }
        });

      // 8. Khởi tạo khi trang load
      loadBrands();
      loadBaseTypes();
      loadVariants();
    </script>
  </body>
</html>
