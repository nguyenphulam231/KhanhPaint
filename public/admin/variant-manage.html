<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý Product Variant</title>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị sản phẩm</p>
            <h1>Thêm Product Variant mới</h1>
          </div>
        </div>

        <section class="admin-card">
          <div class="form-section">
            <select id="brandSelect" required>
              <option value="">-- Chọn thương hiệu --</option>
            </select>
            <select id="lineSelect" required>
              <option value="">-- Chọn dòng sản phẩm --</option>
            </select>
            <select id="baseSelect" required>
              <option value="">-- Chọn BaseType --</option>
            </select>
            <input type="text" id="volume" placeholder="Dung tích (VD: 1L, 5L, 20L)" />
            <input type="text" id="skuCode" placeholder="Mã SKU" required />
            <input type="number" step="0.01" id="unitPrice" placeholder="Giá bán" required />
            <input type="number" id="stockQuantity" placeholder="Số lượng tồn kho" required />
            <input type="text" id="warehouseLocation" placeholder="Vị trí kho (VD: A1, B3)" />
            <button id="saveVariantBtn" type="button">Lưu Product Variant</button>
          </div>
        </section>

        <section class="admin-card" style="margin-top: 30px">
          <h3>Danh sách Product Variants</h3>
          <table style="width: 100%; border-collapse: collapse">
            <thead>
              <tr style="background-color: #f5f5f5">
                <th style="border: 1px solid #ddd; padding: 8px">ID</th>
                <th style="border: 1px solid #ddd; padding: 8px">Thương hiệu</th>
                <th style="border: 1px solid #ddd; padding: 8px">Dòng SP</th>
                <th style="border: 1px solid #ddd; padding: 8px">BaseType</th>
                <th style="border: 1px solid #ddd; padding: 8px">Dung tích</th>
                <th style="border: 1px solid #ddd; padding: 8px">SKU</th>
                <th style="border: 1px solid #ddd; padding: 8px">Giá</th>
                <th style="border: 1px solid #ddd; padding: 8px">Tồn kho</th>
                <th style="border: 1px solid #ddd; padding: 8px">Vị trí</th>
                <th style="border: 1px solid #ddd; padding: 8px">Hành động</th>
              </tr>
            </thead>
            <tbody id="variantsTableBody">
              <tr>
                <td colspan="10" style="text-align: center; padding: 20px">Đang tải dữ liệu...</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("variants");
      initAdminShell();

      async function loadProductLinesByBrand(brandId) {
        const lineSelect = document.getElementById("lineSelect");
        const baseSelect = document.getElementById("baseSelect");
        lineSelect.innerHTML = '<option value="">-- Chọn dòng sản phẩm --</option>';
        baseSelect.innerHTML = '<option value="">-- Chọn BaseType --</option>';
        if (!brandId) return;

        try {
          const lines = await apiRequest(`${API_ROUTES.GET_LINES_BY_BRAND}/${brandId}`);
          setSelectOptions(lineSelect, lines, "-- Chọn dòng sản phẩm --", "line_id", "name");
        } catch (error) {
          console.error("Không thể tải dòng sản phẩm:", error);
        }
      }

      async function loadBaseTypesByLine(lineId) {
        const baseSelect = document.getElementById("baseSelect");
        baseSelect.innerHTML = '<option value="">-- Chọn BaseType --</option>';
        if (!lineId) return;

        try {
          const bases = await apiRequest(`${API_ROUTES.GET_BASETYPES_BY_LINE}/${lineId}`);
          setSelectOptions(baseSelect, bases, "-- Chọn BaseType --", "base_id", "base_name");
        } catch (error) {
          console.error("Không thể tải BaseType:", error);
        }
      }

      function appendCell(row, value) {
        const cell = document.createElement("td");
        cell.style.border = "1px solid #ddd";
        cell.style.padding = "8px";
        cell.textContent = value ?? "-";
        row.appendChild(cell);
      }

      async function loadVariants() {
        const tbody = document.getElementById("variantsTableBody");

        try {
          const variants = await apiRequest(API_ROUTES.GET_VARIANTS);
          tbody.innerHTML = "";

          if (!variants.length) {
            const row = document.createElement("tr");
            const cell = document.createElement("td");
            cell.colSpan = 10;
            cell.style.textAlign = "center";
            cell.style.padding = "20px";
            cell.textContent = "Chưa có product variant nào";
            row.appendChild(cell);
            tbody.appendChild(row);
            return;
          }

          variants.forEach((variant) => {
            const row = document.createElement("tr");
            appendCell(row, variant.variant_id);
            appendCell(row, variant.brand_name);
            appendCell(row, variant.line_name);
            appendCell(row, variant.base_name);
            appendCell(row, variant.volume || "-");
            appendCell(row, variant.sku_code);
            appendCell(row, `${Number(variant.unit_price || 0).toLocaleString("vi-VN")} VND`);
            appendCell(row, variant.stock_quantity);
            appendCell(row, variant.warehouse_location || "-");

            const actionCell = document.createElement("td");
            actionCell.style.border = "1px solid #ddd";
            actionCell.style.padding = "8px";
            const button = document.createElement("button");
            button.type = "button";
            button.textContent = "Xóa";
            button.style.color = "red";
            button.style.cursor = "pointer";
            button.style.border = "none";
            button.style.background = "none";
            button.style.textDecoration = "underline";
            button.addEventListener("click", () => deleteVariant(variant.variant_id));
            actionCell.appendChild(button);
            row.appendChild(actionCell);
            tbody.appendChild(row);
          });
        } catch (error) {
          console.error("Không thể tải variants:", error);
          tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:20px">Không thể tải dữ liệu</td></tr>';
        }
      }

      async function deleteVariant(variantId) {
        if (!confirm("Bạn chắc chắn muốn xóa product variant này?")) return;

        try {
          await apiRequest(`${API_ROUTES.DELETE_VARIANT}/${variantId}`, {
            method: "DELETE",
          });
          alert("Xóa product variant thành công!");
          loadVariants();
        } catch (error) {
          alert(error.message || "Lỗi khi xóa product variant!");
        }
      }

      document.getElementById("brandSelect").addEventListener("change", (event) => {
        loadProductLinesByBrand(event.target.value);
      });

      document.getElementById("lineSelect").addEventListener("change", (event) => {
        loadBaseTypesByLine(event.target.value);
      });

      document.getElementById("saveVariantBtn").addEventListener("click", async () => {
        const data = {
          base_id: document.getElementById("baseSelect").value,
          volume: document.getElementById("volume").value,
          sku_code: document.getElementById("skuCode").value,
          unit_price: document.getElementById("unitPrice").value,
          stock_quantity: document.getElementById("stockQuantity").value,
          warehouse_location: document.getElementById("warehouseLocation").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_VARIANT, {
            method: "POST",
            body: JSON.stringify(data),
          });
          alert("Thêm Product Variant thành công!");
          document.getElementById("skuCode").value = "";
          document.getElementById("volume").value = "";
          document.getElementById("unitPrice").value = "";
          document.getElementById("stockQuantity").value = "";
          document.getElementById("warehouseLocation").value = "";
          loadVariants();
        } catch (error) {
          alert(error.message || "Lỗi khi thêm Product Variant!");
        }
      });

      loadBrandsIntoSelect("brandSelect");
      loadVariants();
    </script>
  </body>
</html>
