<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý khách hàng</title>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị hệ thống</p>
            <h1 id="formTitle">Thêm tài khoản khách hàng mới</h1>
          </div>
        </div>

        <section class="admin-card">
          <div class="form-section">
            <input
              type="text"
              id="custName"
              placeholder="Họ và tên khách hàng *"
              required
            />
            <input
              type="email"
              id="custEmail"
              placeholder="Địa chỉ Email (Dùng đăng nhập) *"
              required
            />
            <input
              type="password"
              id="custPassword"
              placeholder="Mật khẩu tài khoản *"
            />
            <small
              id="pwdHelp"
              style="
                color: #777;
                display: block;
                margin-top: -8px;
                margin-bottom: 4px;
              "
              class="d-none"
            >
              (Để trống nếu không muốn thay đổi mật khẩu hiện tại)
            </small>
            <input type="text" id="custPhone" placeholder="Số điện thoại" />

            <select id="provinceSelect">
              <option value="">-- Chọn Tỉnh/Thành phố --</option>
            </select>
            <select id="wardSelect">
              <option value="">-- Chọn Phường/Xã --</option>
            </select>
            <input
              type="text"
              id="custStreet"
              placeholder="Số nhà, tên đường cụ thể"
            />

            <button id="saveCustBtn" type="button">Lưu khách hàng</button>
            <button id="cancelEditBtn" type="button" class="btn-cancel d-none">
              Hủy sửa
            </button>
          </div>
        </section>

        <section class="admin-card mt-4">
          <h2>Danh sách đối tác & Khách hàng</h2>

          <div class="filter-grid">
            <div>
              <label>Tìm theo thông tin</label>
              <input
                type="text"
                id="filterKeyword"
                placeholder="Nhập tên, email hoặc SĐT..."
              />
            </div>
            <div>
              <label>Lọc theo khu vực (Tỉnh)</label>
              <select id="filterProvince">
                <option value="">-- Tất cả các tỉnh --</option>
              </select>
            </div>
          </div>

          <div class="filter-actions">
            <button class="btn-filter" id="applyFilterBtn">Tìm kiếm</button>
            <button class="btn-reset-filter" id="resetFilterBtn">
              Xóa bộ lọc
            </button>
            <label
              style="
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
                margin-left: 8px;
              "
            >
              <input
                type="checkbox"
                id="selectAllCheck"
                style="width: auto; margin: 0; transform: scale(1.2)"
              />
              <span style="font-size: 14px">Chọn tất cả</span>
            </label>
            <button class="btn-delete-selected" id="deleteSelectedBtn">
              Xóa mục đã chọn (<span id="selectedCount">0</span>)
            </button>
          </div>

          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width: 40px"></th>
                  <th>ID</th>
                  <th>Họ và tên</th>
                  <th>Thông tin liên hệ</th>
                  <th>Địa chỉ giao hàng</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="customerTableBody">
                <tr>
                  <td
                    colspan="6"
                    style="text-align: center; font-style: italic; color: #777"
                  >
                    Đang tải danh sách khách hàng...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("customers");
      initAdminShell();

      // Load dữ liệu địa lý cho Form chính và Bộ lọc
      loadProvincesIntoSelect("provinceSelect");
      loadProvincesIntoSelect("filterProvince");

      // Logic chuyển đổi địa lý phân cấp khi chọn Tỉnh thành
      document
        .getElementById("provinceSelect")
        .addEventListener("change", function () {
          loadWardsIntoSelect(this.value, "wardSelect");
        });

      const tableBody = document.getElementById("customerTableBody");
      const custName = document.getElementById("custName");
      const custEmail = document.getElementById("custEmail");
      const custPassword = document.getElementById("custPassword");
      const custPhone = document.getElementById("custPhone");
      const provinceSelect = document.getElementById("provinceSelect");
      const wardSelect = document.getElementById("wardSelect");
      const custStreet = document.getElementById("custStreet");
      const saveCustBtn = document.getElementById("saveCustBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const formTitle = document.getElementById("formTitle");
      const pwdHelp = document.getElementById("pwdHelp");

      let editingCustomerId = null;

      // ── 1. TẢI DANH SÁCH KHÁCH HÀNG ──────────────────────────────────────────
      async function loadCustomers(params = {}) {
        try {
          const query = new URLSearchParams();
          if (params.keyword) query.append("keyword", params.keyword);
          if (params.province_id)
            query.append("province_id", params.province_id);

          const url =
            API_ROUTES.GET_CUSTOMERS +
            (query.toString() ? "?" + query.toString() : "");
          const response = await fetch(url, {
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          if (!response.ok)
            throw new Error("Không thể truy cập cơ sở dữ liệu.");

          const customers = await response.json();

          // Reset hệ thống checkbox hàng loạt
          document.getElementById("selectAllCheck").checked = false;
          document.getElementById("deleteSelectedBtn").style.display = "none";
          document.getElementById("selectedCount").textContent = "0";

          tableBody.innerHTML = "";
          if (customers.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">Không tìm thấy khách hàng nào hợp lệ.</td></tr>`;
            return;
          }

          customers.forEach((cust) => {
            const row = document.createElement("tr");
            const currentId = cust.customer_id;

            // Xử lý chuỗi hiển thị địa chỉ chi tiết
            let fullAddress = "Chưa cập nhật";
            if (cust.street_address || cust.ward_name || cust.province_name) {
              fullAddress = [
                cust.street_address,
                cust.ward_name,
                cust.province_name,
              ]
                .filter(Boolean)
                .join(", ");
            }

            row.innerHTML = `
              <td style="text-align:center;">
                <input type="checkbox" class="row-check" data-id="${currentId}"
                  style="width:auto; margin:0; transform:scale(1.2); cursor:pointer;" />
              </td>
              <td><b>#${currentId}</b></td>
              <td><div><strong>${cust.name}</strong></div></td>
              <td>
                <small style="color:#333;">
                  • Email: ${cust.email}<br>
                  • SĐT: ${cust.phone || "<i>Chưa rõ</i>"}
                </small>
              </td>
              <td><span style="font-size:13px; color:#555;">${fullAddress}</span></td>
              <td>
                <button class="btn-edit" onclick="prepareEdit(${currentId}, '${cust.name}', '${cust.email}', 
                  '${cust.phone || ""}', '${cust.province_id || ""}', '${cust.ward_id || ""}', '${cust.street_address || ""}')">Sửa</button>
                <button class="btn-delete" onclick="deleteCustomer(${currentId})">Xóa</button>
              </td>
            `;
            tableBody.appendChild(row);
          });

          document.querySelectorAll(".row-check").forEach((chk) => {
            chk.addEventListener("change", updateDeleteSelectedBtn);
          });
        } catch (err) {
          console.error(err);
          tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Gặp lỗi hệ thống khi tải dữ liệu!</td></tr>`;
        }
      }

      // ── XỬ LÝ CHỌN NHIỀU (BULK DELETE) ──────────────────────────────────────
      function updateDeleteSelectedBtn() {
        const checked = document.querySelectorAll(".row-check:checked");
        const btn = document.getElementById("deleteSelectedBtn");
        document.getElementById("selectedCount").textContent = checked.length;
        btn.style.display = checked.length > 0 ? "inline-block" : "none";

        const all = document.querySelectorAll(".row-check");
        document.getElementById("selectAllCheck").checked =
          all.length > 0 && checked.length === all.length;
      }

      document
        .getElementById("selectAllCheck")
        .addEventListener("change", function () {
          document.querySelectorAll(".row-check").forEach((chk) => {
            chk.checked = this.checked;
          });
          updateDeleteSelectedBtn();
        });

      // ── ĐIỀU KHIỂN BỘ LỌC ──────────────────────────────────────────────────
      document
        .getElementById("applyFilterBtn")
        .addEventListener("click", () => {
          loadCustomers({
            keyword: document.getElementById("filterKeyword").value.trim(),
            province_id: document.getElementById("filterProvince").value,
          });
        });

      document
        .getElementById("resetFilterBtn")
        .addEventListener("click", () => {
          document.getElementById("filterKeyword").value = "";
          document.getElementById("filterProvince").value = "";
          loadCustomers();
        });

      // XÓA NHIỀU KHÁCH HÀNG CÙNG LÚC
      document
        .getElementById("deleteSelectedBtn")
        .addEventListener("click", async () => {
          const checked = [...document.querySelectorAll(".row-check:checked")];
          if (!checked.length) return;
          if (
            !confirm(
              `Bạn có chắc chắn muốn xóa nhanh ${checked.length} khách hàng đã chọn?\nThao tác này không thể hoàn tác.`,
            )
          )
            return;

          const ids = checked.map((chk) => chk.dataset.id);
          let successCount = 0;
          let failCount = 0;

          for (const id of ids) {
            try {
              const res = await fetch(API_ROUTES.DELETE_CUSTOMER(id), {
                method: "DELETE",
                headers: { Authorization: "Bearer " + getAdminToken() },
              });
              if (res.ok) successCount++;
              else failCount++;
            } catch {
              failCount++;
            }
          }

          alert(
            `Đã hoàn tất! Xóa thành công ${successCount} tài khoản.${failCount > 0 ? ` Thất bại ${failCount} tài khoản do ràng buộc giao dịch đơn hàng.` : ""}`,
          );
          loadCustomers();
        });

      // ── 2. TRẠNG THÁI CHỈNH SỬA TÀI KHOẢN ────────────────────────────────────
      async function prepareEdit(
        id,
        name,
        email,
        phone,
        provinceId,
        wardId,
        streetAddress,
      ) {
        editingCustomerId = id;
        formTitle.innerText = `Chỉnh sửa thông tin khách hàng #${id}`;
        custName.value = name;
        custEmail.value = email;
        custPhone.value = phone;
        custStreet.value = streetAddress;
        custPassword.placeholder = "Nhập mật khẩu mới tại đây nếu muốn đổi";

        pwdHelp.classList.remove("d-none");
        saveCustBtn.innerText = "Cập nhật dữ liệu";
        cancelEditBtn.classList.remove("d-none");

        // Đồng bộ dữ liệu địa lý phân cấp của bản ghi cũ lên form
        provinceSelect.value = provinceId;
        await loadWardsIntoSelect(provinceId, "wardSelect");
        wardSelect.value = wardId;

        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function resetForm() {
        editingCustomerId = null;
        formTitle.innerText = "Thêm tài khoản khách hàng mới";
        custName.value = "";
        custEmail.value = "";
        custPassword.value = "";
        custPassword.placeholder = "Mật khẩu tài khoản *";
        custPhone.value = "";
        provinceSelect.value = "";
        wardSelect.innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
        custStreet.value = "";

        pwdHelp.classList.add("d-none");
        saveCustBtn.innerText = "Lưu khách hàng";
        cancelEditBtn.classList.add("d-none");
      }

      cancelEditBtn.addEventListener("click", resetForm);

      // ── 3. THỰC THI LƯU (THÊM / CẬP NHẬT) ──────────────────────────────────
      saveCustBtn.addEventListener("click", async () => {
        if (!custName.value.trim() || !custEmail.value.trim()) {
          alert(
            "Vui lòng nhập đầy đủ các thông tin bắt buộc (Họ tên và Email)!",
          );
          return;
        }
        if (!editingCustomerId && !custPassword.value.trim()) {
          alert("Tài khoản mới bắt buộc phải thiết lập mật khẩu khởi tạo!");
          return;
        }

        const data = {
          name: custName.value.trim(),
          email: custEmail.value.trim(),
          password: custPassword.value, // Có thể để trống nếu ở chế độ cập nhật thông tin
          phone: custPhone.value.trim(),
          ward_id: wardSelect.value,
          street_address: custStreet.value.trim(),
        };

        const url = editingCustomerId
          ? API_ROUTES.UPDATE_CUSTOMER(editingCustomerId)
          : API_ROUTES.ADD_CUSTOMER;
        const method = editingCustomerId ? "PUT" : "POST";

        try {
          const response = await fetch(url, {
            method,
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + getAdminToken(),
            },
            body: JSON.stringify(data),
          });

          const result = await response.json().catch(() => null);
          if (response.ok && (editingCustomerId || result?.success)) {
            alert(
              editingCustomerId
                ? "Cập nhật dữ liệu khách hàng thành công!"
                : "Tạo tài khoản đối tác thành công!",
            );
            resetForm();
            loadCustomers();
          } else {
            alert(result?.error || "Xảy ra sự cố bất định khi xử lý tác vụ.");
          }
        } catch (err) {
          console.error(err);
          alert("Lỗi đường truyền kết nối hệ thống!");
        }
      });

      // ── 4. XÓA 1 KHÁCH HÀNG ──────────────────────────────────────────────────
      async function deleteCustomer(id) {
        if (!confirm(`Xác nhận xóa tài khoản khách hàng #${id} khỏi hệ thống?`))
          return;
        try {
          const response = await fetch(API_ROUTES.DELETE_CUSTOMER(id), {
            method: "DELETE",
            headers: { Authorization: "Bearer " + getAdminToken() },
          });
          const result = await response.json().catch(() => null);

          if (response.ok) {
            alert("Đã xóa dữ liệu khách hàng hoàn tất!");
            if (editingCustomerId === id) resetForm();
            loadCustomers();
          } else {
            alert(result?.error || "Không cho phép xóa khách hàng này!");
          }
        } catch (err) {
          console.error(err);
          alert("Gặp lỗi hệ thống khi gửi lệnh xóa!");
        }
      }

      // Khởi chạy nạp danh sách ban đầu
      window.addEventListener("DOMContentLoaded", () => {
        loadCustomers();
      });
    </script>
  </body>
</html>
