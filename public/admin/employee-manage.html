<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Quản lý nhân viên</title>
  </head>
  <body>
    <div class="admin-container">
      <div id="admin-sidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Quản trị nhân sự</p>
            <h1>Thêm nhân viên mới</h1>
          </div>
        </div>

        <section class="admin-card">
          <div class="form-section">
            <input
              type="text"
              id="full_name"
              placeholder="Họ và tên"
              required
            />
            <input type="email" id="email" placeholder="Email" required />
            <input type="text" id="phone" placeholder="Số điện thoại" />
            <input type="date" id="hire_date" />
            <input type="password" id="password" placeholder="Mật khẩu" />
            <select id="job_id">
              <option value="">-- Chọn vị trí --</option>
            </select>
            <select id="role">
              <option value="staff">Nhân viên</option>
              <option value="admin">Admin</option>
            </select>
            <button id="saveEmployeeBtn" type="button">Tạo tài khoản</button>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin-common.js"></script>
    <script>
      mountAdminSidebar("employees");
      initAdminShell();
      loadJobsIntoSelect("job_id");

      document
        .getElementById("saveEmployeeBtn")
        .addEventListener("click", async () => {
          const data = {
            full_name: document.getElementById("full_name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            hire_date: document.getElementById("hire_date").value,
            password: document.getElementById("password").value,
            job_id: document.getElementById("job_id").value,
            role: document.getElementById("role").value,
          };

          const response = await fetch(API_ROUTES.ADD_EMPLOYEE, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + getAdminToken(),
            },
            body: JSON.stringify(data),
          });

          if (response.ok) {
            alert("Thêm nhân viên thành công!");
            window.location.href = "/admin/";
            return;
          }

          alert("Lỗi tạo nhân viên!");
        });
    </script>
  </body>
</html>
