<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>Đăng nhập</title>
  </head>
  <body>
    <div class="login-page-wrapper">
      <div class="login-container">
        <form id="loginForm">
          <h2>Đăng nhập</h2>
          <input type="email" id="email" placeholder="Email" required />
          <input
            type="password"
            id="password"
            placeholder="Mật khẩu"
            required
          />
          <button type="submit">Đăng nhập</button>
          <p style="text-align: center; margin-top: 15px">
            Chưa có tài khoản? <a href="/client/register">Đăng ký ngay</a>
          </p>
          <p id="message"></p>
        </form>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const message = document.getElementById("message");

          try {
            const response = await fetch("/api/auth/public/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password, type: "customer" }),
            });

            const data = await response.json();

            if (response.ok) {
              localStorage.setItem("token", data.token);

              message.style.color = "green";
              message.innerText = "Đăng nhập thành công! Đang chuyển hướng...";

              window.location.href = "/client/";
            } else {
              message.style.color = "red";
              message.innerText =
                data.message || "Email hoặc mật khẩu không chính xác!";
            }
          } catch (error) {
            message.style.color = "red";
            message.innerText = "Lỗi kết nối máy chủ!";
            console.error("Login error:", error);
          }
        });
    </script>
  </body>
</html>
