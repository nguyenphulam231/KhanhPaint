<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KhanhPaint - Sản phẩm</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>KhanhPaint</h1>
      <nav>
        <a href="/client/">Trang chủ</a>
        <a href="/client/products">Sản phẩm</a>
        <a href="/client/orders">Đơn hàng của tôi</a>
        <span id="auth-actions"><a href="/client/login">Đăng nhập</a></span>
      </nav>
    </header>

    <main class="client-page">
      <div class="page-header">
        <div>
          <p class="eyebrow">Catalog & Order Flow</p>
          <h2>Chọn sản phẩm và mã màu</h2>
        </div>
      </div>

      <section class="filter-bar">
        <input id="searchInput" placeholder="Tìm theo thương hiệu, dòng sơn, SKU..." />
        <select id="brandFilter"><option value="">Tất cả thương hiệu</option></select>
        <select id="lineFilter"><option value="">Tất cả dòng sơn</option></select>
        <select id="baseFilter"><option value="">Tất cả base</option></select>
        <button id="applyFilter" class="inline-button">Lọc</button>
      </section>

      <p id="message"></p>
      <section id="productGrid" class="product-grid">Đang tải sản phẩm...</section>
    </main>

    <script src="/js/client-api.js"></script>
    <script>
      const grid = document.getElementById("productGrid");
      const message = document.getElementById("message");
      const cart = [];

      function renderAuth() {
        const target = document.getElementById("auth-actions");
        if (getCustomerToken()) {
          target.innerHTML = `<button class="inline-button" onclick="logout()">Đăng xuất</button>`;
        }
      }

      function logout() {
        clearCustomerToken();
        window.location.href = "/client/login";
      }

      async function loadFilters() {
        const response = await fetch(CLIENT_API_ROUTES.PRODUCT_FILTERS);
        const data = await response.json();
        fillSelect("brandFilter", data.brands, "brand_id", "name", "Tất cả thương hiệu");
        fillSelect("lineFilter", data.lines, "line_id", "name", "Tất cả dòng sơn");
        fillSelect("baseFilter", data.bases, "base_id", "base_name", "Tất cả base");
      }

      function fillSelect(id, rows, valueKey, textKey, firstText) {
        const select = document.getElementById(id);
        select.innerHTML = `<option value="">${firstText}</option>`;
        rows.forEach((row) => {
          const option = document.createElement("option");
          option.value = row[valueKey];
          option.textContent = row[textKey];
          select.appendChild(option);
        });
      }

      async function loadProducts() {
        const params = new URLSearchParams();
        const q = document.getElementById("searchInput").value.trim();
        const brand = document.getElementById("brandFilter").value;
        const line = document.getElementById("lineFilter").value;
        const base = document.getElementById("baseFilter").value;
        if (q) params.set("q", q);
        if (brand) params.set("brand_id", brand);
        if (line) params.set("line_id", line);
        if (base) params.set("base_id", base);

        const response = await fetch(CLIENT_API_ROUTES.PRODUCTS + "?" + params.toString());
        const products = await response.json();
        if (!response.ok) {
          grid.innerHTML = "Không thể tải sản phẩm.";
          return;
        }

        if (products.length === 0) {
          grid.innerHTML = "Chưa có sản phẩm phù hợp.";
          return;
        }

        grid.innerHTML = "";
        for (const p of products) {
          const colorsResponse = await fetch(CLIENT_API_ROUTES.COLORS_BY_BASE(p.base_id));
          const colors = colorsResponse.ok ? await colorsResponse.json() : [];
          const card = document.createElement("article");
          card.className = "product-card";
          card.innerHTML = `
            <h3>${escapeHtml(p.brand_name)} - ${escapeHtml(p.line_name)}</h3>
            <p><strong>SKU:</strong> ${escapeHtml(p.sku_code)} | <strong>Dung tích:</strong> ${escapeHtml(p.volume || "N/A")}</p>
            <p><strong>Base:</strong> ${escapeHtml(p.base_name)} | <strong>Tồn kho:</strong> ${Number(p.stock_quantity || 0)}</p>
            <p class="price">${Number(p.unit_price || 0).toLocaleString("vi-VN")} đ</p>
            <label>Mã màu tương thích</label>
            <select class="color-select">
              <option value="">-- Chọn màu --</option>
              ${colors.map((c) => `<option value="${c.color_id}">${escapeHtml(c.color_code)} - ${escapeHtml(c.color_name)}</option>`).join("")}
            </select>
            <label>Số lượng</label>
            <input class="quantity-input" type="number" min="1" value="1" />
            <button class="order-button">Tạo đơn nhanh</button>
          `;

          card.querySelector(".order-button").addEventListener("click", () => submitQuickOrder(p, card));
          grid.appendChild(card);
        }
      }

      async function submitQuickOrder(product, card) {
        if (!getCustomerToken()) {
          window.location.href = "/client/login";
          return;
        }

        const colorId = card.querySelector(".color-select").value;
        const quantity = Number(card.querySelector(".quantity-input").value || 1);
        if (!colorId) {
          message.style.color = "red";
          message.textContent = "Vui lòng chọn mã màu trước khi tạo đơn.";
          return;
        }

        const response = await fetch(CLIENT_API_ROUTES.ORDERS, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...getCustomerAuthHeaders(),
          },
          body: JSON.stringify({
            items: [{ variant_id: product.variant_id, color_id: colorId, quantity }],
          }),
        });
        const data = await response.json();
        if (response.ok) {
          message.style.color = "green";
          message.textContent = `Đã tạo đơn hàng #${data.order_id}.`;
          await loadProducts();
        } else {
          message.style.color = "red";
          message.textContent = data.error || "Không thể tạo đơn hàng.";
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      document.getElementById("applyFilter").addEventListener("click", loadProducts);
      renderAuth();
      loadFilters().then(loadProducts);
    </script>
  </body>
</html>
