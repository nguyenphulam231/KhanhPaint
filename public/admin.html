<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Trang Quản Trị</title>
  </head>
  <body>
    <div class="admin-container">
      <div class="sidebar">
        <h3>Quản trị hệ thống</h3>
        <a class="menu-item" onclick="showSection('dashboard')">Bảng điều khiển</a>
        <a class="menu-item" onclick="showSection('add-job')">Tạo vị trí công việc</a>
        <a class="menu-item" onclick="showSection('add-employee')">Thêm nhân viên</a>
        <a class="menu-item" onclick="showSection('add-brand')">Quản lý Thương hiệu</a>
        <a class="menu-item" onclick="showSection('add-line')">Quản lý Dòng SP</a>
        <a class="menu-item" onclick="showSection('add-basetype')">Quản lý BaseTypes</a>
        <a class="menu-item" onclick="logout()" style="color: #ffcccc">Đăng xuất</a>
      </div>

      <div class="main-content">
        <div id="dashboard" class="content-section active">
          <h2>Bảng điều khiển</h2>
          <div id="admin-content">Đang tải dữ liệu hệ thống...</div>
        </div>

        <div id="add-job" class="content-section">
          <h2>Tạo vị trí công việc</h2>
          <div class="form-section">
            <input type="text" id="jobTitle" placeholder="Tên vị trí" required />
            <input type="number" id="minSalary" placeholder="Lương tối thiểu" />
            <input type="number" id="maxSalary" placeholder="Lương tối đa" />
            <button onclick="createJob()">Lưu vị trí</button>
          </div>
        </div>

        <div id="add-employee" class="content-section">
          <h2>Thêm nhân viên mới</h2>
          <div class="form-section">
            <input type="text" id="full_name" placeholder="Họ và tên" required />
            <input type="email" id="email" placeholder="Email" required />
            <input type="text" id="phone" placeholder="Số điện thoại" />
            <input type="date" id="hire_date" />
            <input type="password" id="password" placeholder="Mật khẩu" />
            <select id="job_id">
              <option value="">-- Chọn vị trí --</option>
            </select>
            <select id="role">
              <option value="staff">Nhân viên</option>
              <option value="admin">Admin</option>
            </select>
            <button onclick="createEmployee()">Tạo tài khoản</button>
          </div>
        </div>

        <div id="add-brand" class="content-section">
          <h2>Thêm Thương hiệu mới</h2>
          <div class="form-section">
            <input type="text" id="brandName" placeholder="Tên thương hiệu" required />
            <input type="text" id="brandOrigin" placeholder="Xuất xứ" />
            <input type="text" id="brandDesc" placeholder="Mô tả" />
            <button onclick="createBrand()">Lưu thương hiệu</button>
          </div>
        </div>

        <div id="add-line" class="content-section">
          <h2>Thêm Dòng sản phẩm mới</h2>
          <div class="form-section">
            <select id="brandSelect" required>
              <option value="">-- Chọn thương hiệu --</option>
            </select>
            <input type="text" id="lineName" placeholder="Tên dòng sản phẩm" required />
            <select id="isInterior">
              <option value="1">Nội thất</option>
              <option value="0">Ngoại thất</option>
            </select>
            <input type="text" id="lineDesc" placeholder="Mô tả" />
            <button onclick="createLine()">Lưu dòng sản phẩm</button>
          </div>
        </div>

        <div id="add-basetype" class="content-section">
          <h2>Thêm BaseType mới</h2>
          <div class="form-section">
            <select id="brandFilter" onchange="loadLinesByBrand()" required>
              <option value="">-- Chọn thương hiệu trước --</option>
            </select>
            <select id="lineSelect" required>
              <option value="">-- Chọn dòng sản phẩm --</option>
            </select>
            <input type="text" id="baseName" placeholder="Tên Base" required />
            <input type="number" step="0.01" id="coverageRate" placeholder="Độ phủ (m²/l)" />
            <input type="text" id="dryingTime" placeholder="Thời gian khô" />
            <input type="text" id="glossLevel" placeholder="Độ bóng" />
            <input type="text" id="recommendedLayers" placeholder="Số lớp khuyên dùng" />
            <button onclick="createBaseType()">Lưu BaseType</button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "/admin-login.html";

      function showSection(sectionId) {
        document
          .querySelectorAll(".content-section")
          .forEach((sec) => sec.classList.remove("active"));
        document.getElementById(sectionId).classList.add("active");
      }

      function appendOption(select, value, text) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        select.appendChild(option);
      }

      async function apiRequest(url, options = {}) {
        const headers = {
          ...(options.headers || {}),
          Authorization: "Bearer " + token,
        };

        const res = await fetch(url, { ...options, headers });
        const data = await res.json().catch(() => ({}));

        if (res.status === 401 || res.status === 403) {
          localStorage.removeItem("token");
          alert(data.error || "Phiên đăng nhập hết hạn hoặc không có quyền.");
          window.location.href = "/admin-login.html";
          throw new Error("Unauthorized");
        }

        if (!res.ok) {
          throw new Error(data.error || "Yêu cầu thất bại.");
        }

        return data;
      }

      async function loadDashboard() {
        const content = document.getElementById("admin-content");
        try {
          const result = await apiRequest(API_ROUTES.DASHBOARD);
          const pre = document.createElement("pre");
          pre.textContent = JSON.stringify(result, null, 2);
          content.replaceChildren(pre);
        } catch (err) {
          content.textContent = err.message;
        }
      }

      async function loadJobs() {
        try {
          const jobs = await apiRequest(API_ROUTES.GET_JOBS);
          const select = document.getElementById("job_id");
          select.replaceChildren();
          appendOption(select, "", "-- Chọn vị trí công việc --");
          jobs.forEach((job) => appendOption(select, job.job_id, job.job_title));
        } catch (err) {
          console.error("Không thể tải Jobs:", err.message);
        }
      }

      async function createJob() {
        const jobData = {
          job_title: document.getElementById("jobTitle").value,
          min_salary: document.getElementById("minSalary").value,
          max_salary: document.getElementById("maxSalary").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_JOB, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(jobData),
          });
          alert("Đã thêm vị trí!");
          location.reload();
        } catch (err) {
          alert(err.message);
        }
      }

      async function createEmployee() {
        const data = {
          full_name: document.getElementById("full_name").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          hire_date: document.getElementById("hire_date").value,
          password: document.getElementById("password").value,
          job_id: document.getElementById("job_id").value,
          role: document.getElementById("role").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_EMPLOYEE, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          alert("Thêm nhân viên thành công!");
          location.reload();
        } catch (err) {
          alert(err.message);
        }
      }

      async function initData() {
        try {
          const brands = await apiRequest(API_ROUTES.GET_BRANDS);
          const brandSelect = document.getElementById("brandSelect");
          const brandFilter = document.getElementById("brandFilter");
          brandSelect.replaceChildren();
          brandFilter.replaceChildren();
          appendOption(brandSelect, "", "-- Chọn thương hiệu --");
          appendOption(brandFilter, "", "-- Chọn thương hiệu trước --");
          brands.forEach((brand) => {
            appendOption(brandSelect, brand.brand_id, brand.name);
            appendOption(brandFilter, brand.brand_id, brand.name);
          });
        } catch (err) {
          console.error("Không thể tải thương hiệu:", err.message);
        }
      }

      async function loadLinesByBrand() {
        const brandId = document.getElementById("brandFilter").value;
        const lineSelect = document.getElementById("lineSelect");
        lineSelect.replaceChildren();
        appendOption(lineSelect, "", "-- Chọn dòng sản phẩm --");
        if (!brandId) return;

        try {
          const lines = await apiRequest(`${API_ROUTES.GET_LINES_BY_BRAND}/${brandId}`);
          lines.forEach((line) => appendOption(lineSelect, line.line_id, line.name));
        } catch (err) {
          alert(err.message);
        }
      }

      async function createBrand() {
        const brandData = {
          name: document.getElementById("brandName").value,
          origin: document.getElementById("brandOrigin").value,
          description: document.getElementById("brandDesc").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_BRAND, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(brandData),
          });
          alert("Thêm thương hiệu thành công!");
          location.reload();
        } catch (err) {
          alert(err.message);
        }
      }

      async function createLine() {
        const data = {
          brand_id: document.getElementById("brandSelect").value,
          name: document.getElementById("lineName").value,
          is_interior: document.getElementById("isInterior").value,
          description: document.getElementById("lineDesc").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_LINE, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          alert("Đã thêm dòng sản phẩm!");
          location.reload();
        } catch (err) {
          alert(err.message);
        }
      }

      async function createBaseType() {
        const data = {
          line_id: document.getElementById("lineSelect").value,
          base_name: document.getElementById("baseName").value,
          coverage_rate: document.getElementById("coverageRate").value,
          drying_time: document.getElementById("dryingTime").value,
          gloss_level: document.getElementById("glossLevel").value,
          recommended_layers: document.getElementById("recommendedLayers").value,
        };

        try {
          await apiRequest(API_ROUTES.ADD_BASETYPE, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          alert("Đã thêm BaseType!");
          location.reload();
        } catch (err) {
          alert(err.message);
        }
      }

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "/admin-login.html";
      }

      loadDashboard();
      loadJobs();
      initData();
    </script>
  </body>
</html>
